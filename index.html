<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abako Gestão | Enterprise Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #059669;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --surface: rgba(255, 255, 255, 0.7);
            --border: rgba(15, 23, 42, 0.08);
            --text-main: #0f172a;
            --text-secondary: #64748b;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            
            /* Cores de Marca */
            --youtube-bg: #FF0000;
            --instagram-bg: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --facebook-bg: #1877F2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 80px 20px 160px 20px;
        }

        /* BOTÃO DE MÚSICA (GLASSMOPRHISM) */
        .music-control { position: fixed; top: 30px; right: 30px; z-index: 2000; }
        #play-music-btn {
            background: var(--surface); 
            border: 1px solid var(--border);
            color: var(--text-main); 
            width: 52px; height: 52px; 
            border-radius: 16px;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            backdrop-filter: blur(12px); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
        }
        #play-music-btn:hover { 
            transform: scale(1.05); 
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* CONTAINER PRINCIPAL */
        .container {
            width: 100%; 
            max-width: 440px; 
            text-align: center;
            background: var(--surface); 
            padding: 48px 32px; 
            border-radius: 32px;
            border: 1px solid var(--border); 
            backdrop-filter: blur(24px);
            box-shadow: var(--shadow-lg);
        }

        .profile-header { display: flex; align-items: center; justify-content: flex-start; gap: 20px; margin-bottom: 40px; }
        .profile-img { 
            width: 72px; height: 72px; 
            border-radius: 22px; 
            border: 1px solid var(--border); 
            background: #fff; 
            padding: 4px; 
            object-fit: cover; 
            box-shadow: var(--shadow-sm);
        }
        .profile h1 { font-size: 1.4rem; font-weight: 800; color: var(--text-main); margin: 0; letter-spacing: -0.5px; }
        .profile p { font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }

        /* VÍDEO REFINADO */
        .video-wrapper {
            position: relative; width: 100%; padding-bottom: 56.25%; height: 0;
            margin-bottom: 32px; border-radius: 24px; overflow: hidden; 
            border: 1px solid var(--border); box-shadow: var(--shadow-sm);
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* LINKS AREA */
        .links-area { display: flex; flex-direction: column; gap: 16px; }
        .link-button {
            display: flex; align-items: center; justify-content: space-between;
            text-decoration: none; padding: 20px 28px; border-radius: 20px; 
            font-weight: 700; font-size: 0.95rem; color: #ffffff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .link-button:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 12px 24px rgba(0,0,0,0.15); 
            filter: saturate(1.2);
        }

        .link-youtube { background: var(--youtube-bg); }
        .link-instagram { background: var(--instagram-bg); }
        .link-facebook { background: var(--facebook-bg); }

        .link-button .label { display: flex; align-items: center; gap: 14px; }
        .link-button i { font-size: 1.3rem; }
        .link-button .fa-chevron-right { font-size: 0.7rem; opacity: 0.6; }

        /* CARROSSEL RODAPÉ (MODERNO/WHITE) */
        .ads-carousel-viewport {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 520px; height: 100px;
            z-index: 1000; overflow: hidden; border-radius: 28px;
            background: #ffffff; border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.12);
        }
        .ads-track { display: flex; height: 100%; transition: transform 1s cubic-bezier(0.23, 1, 0.32, 1); }
        .ad-card { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; text-decoration: none; }
        
        .ad-icon-box { 
            width: 52px; height: 52px; background: #ecfdf5; 
            border-radius: 16px; display: flex; align-items: center; 
            justify-content: center; color: var(--primary-color); 
            border: 1px solid #d1fae5; font-size: 1.4rem;
        }
        
        .ad-texts h4 { color: var(--text-main); font-size: 0.95rem; font-weight: 700; margin: 0; }
        .ad-texts p { color: var(--text-secondary); font-size: 0.8rem; margin-top: 2px; }
        
        .ad-cta-btn { 
            background: var(--text-main); color: #fff; 
            padding: 14px 22px; border-radius: 14px; 
            font-size: 0.85rem; font-weight: 700; 
            transition: 0.2s;
        }
        .ad-cta-btn:hover { background: #000; }

        footer { margin-top: 48px; font-size: 0.75rem; color: var(--text-secondary); font-weight: 500; opacity: 0.8; }

        @media (max-width: 480px) { 
            .ad-cta-btn span { display: none; }
            .container { padding: 32px 20px; }
        }
    </style>
</head>
<body>

    <div class="music-control">
        <button id="play-music-btn" title="Ativar Música de Fundo">
            <i class="fas fa-play" id="music-icon"></i>
        </button>
    </div>
    
    <div id="youtube-audio-player"></div>

    <div class="container">
        <header class="profile">
            <div class="profile-header">
                <img src="https://via.placeholder.com/150" alt="Abako Logo" class="profile-img">
                <div class="profile-text-block">
                    <h1>Abako Gestão</h1>
                    <p>Financial Intelligence</p>
                </div>
            </div>
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/csTn_ikVIOo" title="Institutional Video" allowfullscreen></iframe>
            </div>
        </header>

        <nav class="links-area">
            <a href="https://youtube.com" target="_blank" class="link-button link-youtube">
                <span class="label"><i class="fab fa-youtube"></i> Canal no YouTube</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="https://instagram.com" target="_blank" class="link-button link-instagram">
                <span class="label"><i class="fab fa-instagram"></i> Instagram Oficial</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="https://facebook.com" target="_blank" class="link-button link-facebook">
                <span class="label"><i class="fab fa-facebook"></i> Página Business</span>
                <i class="fas fa-chevron-right"></i>
            </a>
        </nav>

        <footer>&copy; 2026 Abako Systems. Excellence in Financial Management.</footer>
    </div>

    <div class="ads-carousel-viewport">
        <div class="ads-track" id="adsTrack">
            <a href="https://meli.la/2wai2Th" target="_blank" class="ad-card">
                <div class="ad-info">
                    <div class="ad-icon-box"><i class="fas fa-award"></i></div>
                    <div class="ad-texts">
                        <h4>Oferta Corporate 2026</h4>
                        <p>Condições exclusivas no Mercado Livre</p>
                    </div>
                </div>
                <div class="ad-cta-btn"><span>Ver Oferta</span> <i class="fas fa-arrow-right"></i></div>
            </a>
            <a href="https://meli.la/2wai2Th" target="_blank" class="ad-card">
                <div class="ad-info">
                    <div class="ad-icon-box"><i class="fas fa-shield-alt"></i></div>
                    <div class="ad-texts">
                        <h4>Gestão Premium SaaS</h4>
                        <p>A segurança que sua empresa precisa</p>
                    </div>
                </div>
                <div class="ad-cta-btn"><span>Assinar</span> <i class="fas fa-arrow-right"></i></div>
            </a>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // Player de Música
        let player;
        let isPlaying = false;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-audio-player', { 
                height: '0', width: '0', videoId: '3ZltabzNSDs', 
                events: { 'onReady': onPlayerReady } 
            });
        }
        function onPlayerReady() {
            const btn = document.getElementById('play-music-btn');
            const icon = document.getElementById('music-icon');
            btn.onclick = () => {
                if (!isPlaying) { 
                    player.playVideo(); 
                    icon.classList.replace('fa-play', 'fa-pause'); 
                } else { 
                    player.pauseVideo(); 
                    icon.classList.replace('fa-pause', 'fa-play'); 
                }
                isPlaying = !isPlaying;
            };
        }

        // Lógica do Carrossel de Anúncios
        const track = document.getElementById('adsTrack');
        let currentSlide = 0;
        setInterval(() => {
            currentSlide = (currentSlide + 1) % 2;
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
        }, 6000);
    </script>
</body>
</html>
